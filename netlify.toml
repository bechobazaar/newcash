[build]
  publish = "public"
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

# ✅ API routing
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# 🛡️ Service worker: always fresh
[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/firebase-messaging-sw.js"
  to   = "/firebase-messaging-sw.js"
  status = 200
  force = true

# ✅ Manifest fix
[[redirects]]
  from = "/manifest.webmanifest"
  to   = "/manifest.webmanifest"
  status = 200
  force = true

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "no-store"

# 🌐 Canonical domain
[[redirects]]
  from = "http://www.bechobazaar.com/*"
  to = "https://bechobazaar.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.bechobazaar.com/*"
  to = "https://bechobazaar.com/:splat"
  status = 301
  force = true

# ⏱️ Scheduled function (optional)
[functions."auto-bump"]
  schedule = "*/10 * * * *"

# ─────────────────────────────────────────
# 🔥 CORS for AUDIO SPLITTER (NEW ADD)
# ─────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/split-audio"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Max-Age       = "600"
    Vary                         = "Origin"

# ─────────────────────────────────────────
# Existing function CORS (unchanged)
# ─────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/price-advisor-web"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Plan"
    Access-Control-Max-Age       = "600"
    Vary                         = "Origin"

# ─────────────────────────────────────────
# 🔥 Global fallback (IMPORTANT FIX)
# ─────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Plan"
    Access-Control-Max-Age       = "600"
    Vary                         = "Origin"
